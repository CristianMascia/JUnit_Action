# ------------------------------------------------------------------------
# Workflow di Continuous Integration per il progetto "esempio-carrello".
#
# Questo file viene letto automaticamente da GitHub ogni volta che:
#   - viene fatto un push sul branch main
#   - viene aperta o aggiornata una pull request verso main
#
# Al trigger, GitHub avvia una macchina virtuale Ubuntu pulita, installa
# Java 11 (distribuzione Temurin = OpenJDK Adoptium), clona il repository
# e lancia `mvn test`. Se anche un solo test JUnit fallisce, il job
# termina con esito rosso e il check compare come "failed" nella UI
# della pull request, impedendo (se configurato) il merge.
#
# Il risultato si vede nella tab "Actions" del repository.
# ------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Scarica il codice del repository nel runner
      - uses: actions/checkout@v4

      # Installa JDK 11
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven     # velocizza le run successive

      # Compila ed esegue i test JUnit tramite Maven
      - name: Run tests
        run: mvn --batch-mode test
